services:
  - type: web
    name: stucal
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn tutoring.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: TEACHER_PASSWORD
        sync: false          # 在 Render 後台手動填入
      - key: DATABASE_URL
        fromDatabase:
          name: stucal-db
          property: connectionString

databases:
  - name: stucal-db
    plan: free

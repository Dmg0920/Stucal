{% extends "core/base.html" %}
{% block title %}切換身份 — Stucal{% endblock %}

{% block content %}
<div>

  <h1 class="text-[34px] font-bold tracking-tight text-black mb-6">選擇身份</h1>

  <form method="post" x-data="{ role: '{{ form.role.value|default:'parent' }}' }" class="space-y-0">
    {% csrf_token %}

    <p class="ios-section-header" style="margin-top: 0; padding-top: 0;">身份</p>
    <div class="ios-section mb-5">

      <label class="ios-cell cursor-pointer">
        <input type="radio" name="role" value="parent" x-model="role" class="sr-only">
        <span class="w-8 h-8 rounded-full bg-[rgba(142,142,147,0.15)] flex items-center justify-center mr-2 text-lg flex-shrink-0">👨‍👩‍👧</span>
        <div class="flex-1">
          <p class="text-[17px] text-black">家長</p>
          <p class="text-[13px] text-[#8E8E93]">查看課程與進度</p>
        </div>
        <svg x-show="role === 'parent'" class="w-5 h-5 text-[#007AFF] flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
        </svg>
      </label>

      <label class="ios-cell cursor-pointer">
        <input type="radio" name="role" value="teacher" x-model="role" class="sr-only">
        <span class="w-8 h-8 rounded-full bg-[rgba(255,149,0,0.12)] flex items-center justify-center mr-2 text-lg flex-shrink-0">👩‍🏫</span>
        <div class="flex-1">
          <p class="text-[17px] text-black">老師</p>
          <p class="text-[13px] text-[#8E8E93]">管理課程與備註</p>
        </div>
        <svg x-show="role === 'teacher'" class="w-5 h-5 text-[#007AFF] flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
        </svg>
      </label>

    </div>

    <!-- 老師密碼 -->
    <div x-show="role === 'teacher'"
         x-transition:enter="transition ease-out duration-150"
         x-transition:enter-start="opacity-0 -translate-y-1"
         x-transition:enter-end="opacity-100 translate-y-0">
      <p class="ios-section-header">驗證</p>
      <div class="ios-section mb-5">
        <div class="ios-cell">
          <label class="text-[17px] text-black w-20 flex-shrink-0">密碼</label>
          {{ form.password }}
        </div>
      </div>
      {% if form.password.errors %}
      <p class="ios-section-footer text-[#FF3B30]">
        {% for e in form.password.errors %}{{ e }}{% endfor %}
      </p>
      {% endif %}
    </div>

    <div class="pt-2">
      <button type="submit" class="ios-btn">確認切換</button>
    </div>

  </form>

  <div class="pt-4 text-center">
    <a href="{% url 'home' %}" class="text-[17px] text-[#8E8E93]">取消</a>
  </div>

</div>
{% endblock %}

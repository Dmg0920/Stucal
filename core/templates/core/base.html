<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}家教課程管理{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', sans-serif; }
    input[type="text"], input[type="url"], input[type="date"], input[type="time"],
    input[type="password"], textarea, select {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      border: 1px solid #e2e8f0;
      color: #1e293b;
      background: white;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus, select:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

  <!-- Header -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-40">
    <div class="max-w-lg mx-auto px-4 h-14 flex items-center justify-between">
      <a href="{% url 'home' %}" class="flex items-center gap-2">
        <span class="text-lg">📚</span>
        <span class="font-semibold text-slate-800">家教管理</span>
      </a>
      <div class="flex items-center gap-2">
        <span class="text-xs font-medium px-2 py-1 rounded-md
          {% if request.session.role == 'teacher' %}bg-amber-100 text-amber-700{% else %}bg-slate-100 text-slate-600{% endif %}">
          {% if request.session.role == 'teacher' %}老師{% else %}家長{% endif %}
        </span>
        <a href="{% url 'login' %}"
           class="text-xs text-slate-500 hover:text-slate-800 font-medium px-2.5 py-1 rounded-md border border-slate-200 hover:border-slate-300 transition bg-white">
          切換
        </a>
      </div>
    </div>
  </header>

  <!-- 訊息提示 -->
  {% if messages %}
  <div class="max-w-lg mx-auto px-4 pt-3">
    {% for message in messages %}
    <div x-data="{ show: true }" x-show="show" x-cloak
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="flex items-center justify-between bg-green-50 border border-green-200 text-green-800 px-4 py-2.5 rounded-lg mb-2 text-sm">
      <span>{{ message }}</span>
      <button @click="show = false" class="ml-3 text-green-500 hover:text-green-700">✕</button>
    </div>
    {% endfor %}
  </div>
  {% endif %}

  <main class="max-w-lg mx-auto px-4 py-5">
    {% block content %}{% endblock %}
  </main>

  <!-- 底部導覽 -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 z-50">
    <div class="max-w-lg mx-auto flex h-14">

      <a href="{% url 'home' %}"
         class="flex-1 flex flex-col items-center justify-center gap-0.5 text-[11px] font-medium transition
                {% if request.resolver_match.url_name == 'home' %}text-indigo-600{% else %}text-slate-400 hover:text-slate-600{% endif %}">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="{% if request.resolver_match.url_name == 'home' %}2.5{% else %}1.8{% endif %}" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        首頁
      </a>

      <a href="{% url 'calendar' %}"
         class="flex-1 flex flex-col items-center justify-center gap-0.5 text-[11px] font-medium transition
                {% if request.resolver_match.url_name == 'calendar' %}text-indigo-600{% else %}text-slate-400 hover:text-slate-600{% endif %}">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="{% if request.resolver_match.url_name == 'calendar' %}2.5{% else %}1.8{% endif %}" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        月曆
      </a>

      <a href="{% url 'materials_list' %}"
         class="flex-1 flex flex-col items-center justify-center gap-0.5 text-[11px] font-medium transition
                {% if 'material' in request.resolver_match.url_name %}text-indigo-600{% else %}text-slate-400 hover:text-slate-600{% endif %}">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="{% if 'material' in request.resolver_match.url_name %}2.5{% else %}1.8{% endif %}" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
        教材
      </a>

      <a href="{% url 'history' %}"
         class="flex-1 flex flex-col items-center justify-center gap-0.5 text-[11px] font-medium transition
                {% if request.resolver_match.url_name == 'history' %}text-indigo-600{% else %}text-slate-400 hover:text-slate-600{% endif %}">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="{% if request.resolver_match.url_name == 'history' %}2.5{% else %}1.8{% endif %}" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        紀錄
      </a>

    </div>
  </nav>

</body>
</html>

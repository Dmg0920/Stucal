<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}家教課程管理{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen pb-20">

  <!-- 頂部 Header -->
  <header class="bg-indigo-600 text-white shadow-md">
    <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="{% url 'home' %}" class="text-lg font-bold tracking-wide">家教管理</a>
      <div class="flex items-center gap-3">
        <span class="text-xs bg-indigo-800 px-2 py-1 rounded-full">
          {% if request.session.role == 'teacher' %}老師模式{% else %}家長模式{% endif %}
        </span>
        <a href="{% url 'login' %}"
           class="text-xs bg-white text-indigo-700 font-semibold px-3 py-1 rounded-full hover:bg-indigo-50 transition">
          切換身份
        </a>
      </div>
    </div>
  </header>

  <!-- 訊息提示 -->
  {% if messages %}
  <div class="max-w-2xl mx-auto px-4 mt-3">
    {% for message in messages %}
    <div x-data="{ show: true }" x-show="show" x-cloak
         class="flex items-center justify-between bg-green-100 border border-green-300 text-green-800 px-4 py-2 rounded-lg mb-2">
      <span>{{ message }}</span>
      <button @click="show = false" class="ml-4 text-green-600 hover:text-green-900 font-bold">&times;</button>
    </div>
    {% endfor %}
  </div>
  {% endif %}

  <!-- 主要內容 -->
  <main class="max-w-2xl mx-auto px-4 py-4">
    {% block content %}{% endblock %}
  </main>

  <!-- 底部導覽列 -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-50">
    <div class="max-w-2xl mx-auto flex justify-around items-center h-16">

      <a href="{% url 'home' %}"
         class="flex flex-col items-center gap-0.5 text-xs {% if request.resolver_match.url_name == 'home' %}text-indigo-600{% else %}text-gray-500 hover:text-indigo-600{% endif %} transition">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        首頁
      </a>

      <a href="{% url 'calendar' %}"
         class="flex flex-col items-center gap-0.5 text-xs {% if request.resolver_match.url_name == 'calendar' %}text-indigo-600{% else %}text-gray-500 hover:text-indigo-600{% endif %} transition">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        月曆
      </a>

      <a href="{% url 'materials_list' %}"
         class="flex flex-col items-center gap-0.5 text-xs {% if 'material' in request.resolver_match.url_name %}text-indigo-600{% else %}text-gray-500 hover:text-indigo-600{% endif %} transition">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
        教材
      </a>

      <a href="{% url 'history' %}"
         class="flex flex-col items-center gap-0.5 text-xs {% if request.resolver_match.url_name == 'history' %}text-indigo-600{% else %}text-gray-500 hover:text-indigo-600{% endif %} transition">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        紀錄
      </a>

    </div>
  </nav>

</body>
</html>

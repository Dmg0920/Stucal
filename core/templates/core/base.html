<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}家教課程管理{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24">

  <!-- 頂部 Header -->
  <header class="bg-gradient-to-r from-indigo-600 to-violet-600 text-white shadow-lg sticky top-0 z-40">
    <div class="max-w-2xl mx-auto px-4 py-3.5 flex items-center justify-between">
      <a href="{% url 'home' %}" class="flex items-center gap-2">
        <span class="text-xl">📚</span>
        <span class="text-base font-bold tracking-wide">家教管理</span>
      </a>
      <div class="flex items-center gap-2">
        <span class="text-xs px-2.5 py-1 rounded-full font-medium
          {% if request.session.role == 'teacher' %}bg-amber-400 text-amber-900{% else %}bg-white/20 text-white{% endif %}">
          {% if request.session.role == 'teacher' %}👩‍🏫 老師{% else %}👨‍👩‍👧 家長{% endif %}
        </span>
        <a href="{% url 'login' %}"
           class="text-xs bg-white/15 hover:bg-white/25 text-white font-medium px-3 py-1.5 rounded-full border border-white/30 transition">
          切換
        </a>
      </div>
    </div>
  </header>

  <!-- 訊息提示 -->
  {% if messages %}
  <div class="max-w-2xl mx-auto px-4 pt-3">
    {% for message in messages %}
    <div x-data="{ show: true }" x-show="show" x-cloak
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 -translate-y-1"
         class="flex items-center justify-between bg-emerald-50 border border-emerald-200 text-emerald-800 px-4 py-3 rounded-xl mb-2 shadow-sm">
      <div class="flex items-center gap-2">
        <svg class="w-4 h-4 text-emerald-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span class="text-sm font-medium">{{ message }}</span>
      </div>
      <button @click="show = false" class="ml-4 text-emerald-400 hover:text-emerald-700 transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    {% endfor %}
  </div>
  {% endif %}

  <!-- 主要內容 -->
  <main class="max-w-2xl mx-auto px-4 py-5">
    {% block content %}{% endblock %}
  </main>

  <!-- 底部導覽列 -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-slate-200 shadow-2xl z-50">
    <div class="max-w-2xl mx-auto flex justify-around items-center h-16 px-2">

      <a href="{% url 'home' %}"
         class="flex flex-col items-center gap-0.5 px-4 py-2 rounded-xl transition
                {% if request.resolver_match.url_name == 'home' %}text-indigo-600 bg-indigo-50{% else %}text-slate-400 hover:text-indigo-500{% endif %}">
        <svg class="w-5 h-5" fill="{% if request.resolver_match.url_name == 'home' %}currentColor{% else %}none{% endif %}" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        <span class="text-[11px] font-medium">首頁</span>
      </a>

      <a href="{% url 'calendar' %}"
         class="flex flex-col items-center gap-0.5 px-4 py-2 rounded-xl transition
                {% if request.resolver_match.url_name == 'calendar' %}text-indigo-600 bg-indigo-50{% else %}text-slate-400 hover:text-indigo-500{% endif %}">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        <span class="text-[11px] font-medium">月曆</span>
      </a>

      <a href="{% url 'materials_list' %}"
         class="flex flex-col items-center gap-0.5 px-4 py-2 rounded-xl transition
                {% if 'material' in request.resolver_match.url_name %}text-indigo-600 bg-indigo-50{% else %}text-slate-400 hover:text-indigo-500{% endif %}">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
        <span class="text-[11px] font-medium">教材</span>
      </a>

      <a href="{% url 'history' %}"
         class="flex flex-col items-center gap-0.5 px-4 py-2 rounded-xl transition
                {% if request.resolver_match.url_name == 'history' %}text-indigo-600 bg-indigo-50{% else %}text-slate-400 hover:text-indigo-500{% endif %}">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        <span class="text-[11px] font-medium">紀錄</span>
      </a>

    </div>
  </nav>

</body>
</html>
